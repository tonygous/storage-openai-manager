name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

      - name: Static security analysis
        run: python -m bandit -q -r app.py openai_manager.py

      - name: Dependency vulnerability audit
        run: python -m pip_audit -r requirements.txt -r requirements-dev.txt

      - name: Secret scan
        run: >-
          python -m detect_secrets scan --all-files
          --exclude-files '(^|/)(\.git|\.pytest_cache|\.ruff_cache|__pycache__)(/|$)'
          | python -c "import json, sys; results = json.load(sys.stdin)['results']; assert not any(results.values()), results"

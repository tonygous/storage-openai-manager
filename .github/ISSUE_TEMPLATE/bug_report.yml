name: Bug report
description: Report a reproducible problem in the application.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include API keys, document contents, or full OpenAI error payloads.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and the result you expected.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide the smallest safe sequence that reproduces the problem.
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Operating system
      placeholder: Windows 11, macOS 15, Ubuntu 24.04
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional safe context
      description: Include redacted logs or screenshots only when they contain no credentials or private data.
